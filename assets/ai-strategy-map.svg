<svg xmlns="http://www.w3.org/2000/svg" viewBox="24 73 872 703" role="img" aria-labelledby="title desc">
  <title id="title">AI Strategy system map</title>
  <desc id="desc">A blueprint-style system map connecting five principles of tactful AI application: asking better questions, using full capabilities, automating tactfully, evaluating critically, and recognizing limits.</desc>
  <defs>
    <linearGradient id="blueprint-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B4AB2"/>
      <stop offset="1" stop-color="#33419F"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#FFFFFF" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <style>
      .guide{fill:none;stroke:#F1F5FF;stroke-width:1.6;opacity:.18}
      .orbit{fill:none;stroke:#F1F5FF;stroke-width:2.1;opacity:.25}
      .main{fill:none;stroke:#F4F7FF;stroke-width:2.25;stroke-linecap:round;stroke-linejoin:round;opacity:.78}
      .minor{fill:none;stroke:#F4F7FF;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round;opacity:.5}
      .node{fill:none;stroke:#F4F7FF;stroke-width:1.55;opacity:.54}
      .hub{fill:none;stroke:#F4F7FF;stroke-width:2.6;opacity:.76}
      .hub-ring{fill:none;stroke:#F4F7FF;stroke-width:1.55;opacity:.46}
      .label,.meta,.note{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFF;text-transform:uppercase}
      .label{font-size:12px;font-weight:800;letter-spacing:1.8px}
      .meta{font-size:18px;font-weight:800;letter-spacing:3.5px}
      .note{font-size:14px;font-weight:800;letter-spacing:2.2px}
      .display{font-family:Georgia,"Times New Roman",serif;fill:#FFFFFF;font-size:80px;font-weight:400;letter-spacing:-4.5px}
    </style>
  </defs>

  <rect width="1000" height="800" fill="url(#blueprint-bg)"/>
  <rect width="1000" height="800" fill="url(#grid)"/>
  <line class="guide" x1="0" y1="400" x2="1000" y2="400"/>
  <line class="guide" x1="500" y1="0" x2="500" y2="800"/>

  <ellipse class="orbit" cx="704" cy="858" rx="640" ry="372" transform="rotate(-12 704 858)"/>
  <ellipse class="orbit" cx="740" cy="888" rx="520" ry="304" transform="rotate(-9 740 888)"/>
  <ellipse class="orbit" cx="770" cy="910" rx="388" ry="238" transform="rotate(-5 770 910)"/>

  <circle class="hub-ring" cx="762" cy="728" r="112"/>
  <circle class="hub-ring" cx="762" cy="728" r="68"/>
  <circle class="hub" cx="762" cy="728" r="28"/>

  <g aria-label="Ask better questions">
    <line class="main" x1="762" y1="728" x2="68" y2="478"/>
    <polyline class="minor" points="68,478 68,375 271,375"/>
    <circle class="node" cx="68" cy="478" r="8"/>
    <text class="label" x="70" y="366">ASK BETTER QUESTIONS</text>
  </g>

  <g aria-label="Use full capabilities">
    <line class="main" x1="762" y1="728" x2="251" y2="478"/>
    <polyline class="minor" points="251,478 251,439 447,439"/>
    <circle class="node" cx="251" cy="478" r="8"/>
    <text class="label" x="249" y="430">USE FULL CAPABILITIES</text>
  </g>

  <g aria-label="Automate tactfully">
    <line class="main" x1="762" y1="728" x2="691" y2="444"/>
    <polyline class="minor" points="691,444 691,364 878,364"/>
    <circle class="node" cx="691" cy="444" r="8"/>
    <text class="label" x="690" y="355">AUTOMATE TACTFULLY</text>
  </g>

  <g aria-label="Evaluate critically">
    <line class="main" x1="762" y1="728" x2="62" y2="670"/>
    <polyline class="minor" points="62,670 62,611 249,611"/>
    <circle class="node" cx="62" cy="670" r="8"/>
    <text class="label" x="62" y="602">EVALUATE CRITICALLY</text>
  </g>

  <g aria-label="Recognize limits">
    <line class="main" x1="762" y1="728" x2="481" y2="343"/>
    <polyline class="minor" points="481,343 481,271 641,271"/>
    <circle class="node" cx="481" cy="343" r="8"/>
    <text class="label" x="482" y="262">RECOGNIZE LIMITS</text>
  </g>

  <text class="meta" x="402" y="118">SYSTEM MAP · STRATEGIC ELEMENTS</text>
  <text class="display" x="66" y="205">AI Strategy</text>
  <text class="note" x="60" y="747">AI CAPABILITIES · HUMAN JUDGMENT · MEANINGFUL RESULTS</text>
</svg>
